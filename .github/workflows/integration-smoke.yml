name: Integration Smoke

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why the dedicated integration smoke is being triggered
        required: false
        default: manual verification

concurrency:
  group: integration-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-smoke:
    name: Integration Smoke
    runs-on:
      - self-hosted
      - integration-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration smoke
        run: pnpm verify:integration:smoke

      - name: Print trigger context
        run: |
          echo "reason=${{ inputs.reason }}"
          echo "ref=${{ github.ref }}"
